<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лаки-блок — испытание удачи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            font-family: 'Courier New', 'Minecraft', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lucky-block-card {
            background: #f5a623;
            background: radial-gradient(circle at 30% 20%, #ffcc44, #d48a00);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,200,0.6);
            max-width: 500px;
            width: 100%;
            padding: 25px 20px 30px;
            border: 4px solid #ffdd77;
            text-align: center;
        }

        .star-icon {
            font-size: 64px;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
            margin-bottom: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #fff3c9;
            font-size: 32px;
            text-shadow: 4px 4px 0 #b45f06;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .task-box {
            background: #fef0cf;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            border: 3px solid #e6a017;
            box-shadow: inset 0 0 15px rgba(100,50,0,0.2), 0 5px 10px rgba(0,0,0,0.2);
        }

        .task-box img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            margin: 0 auto;
        }

        .info {
            font-size: 12px;
            color: #ffefb9;
            margin-top: 20px;
            border-top: 1px solid #ffefb9;
            padding-top: 15px;
            text-shadow: 1px 1px 0 #7a3a00;
        }
    </style>
</head>
<body>
<div class="lucky-block-card">
    <div class="star-icon">⭐ ✨ ⭐</div>
    <h1>ЛАКИ-БЛОК</h1>
    <div class="task-box" id="taskBox">
        <img id="taskImage" src="" alt="Испытание удачи">
    </div>
    <div class="info">
        🔮 Ваше испытание удачи<br>
        🎁 Сканируйте QR-код снова для нового
    </div>
</div>

<script>
    // ======================== НАСТРОЙКИ ========================
    const TOTAL_IMAGES = 16;   // 16 картинок
    const IMAGE_EXT = 'png';   // расширение .png
    // ============================================================

    function getRandomImagePath() {
        const randomNumber = Math.floor(Math.random() * TOTAL_IMAGES) + 1;
        return `images/${randomNumber}.${IMAGE_EXT}`;
    }

    // При загрузке страницы показываем случайную картинку
    const imgPath = getRandomImagePath();
    const imgElement = document.getElementById('taskImage');
    imgElement.src = imgPath;
    imgElement.alt = `Испытание удачи`;
</script>
</body>
</html>
